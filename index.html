<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mis Habitos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f4faf4; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
input, button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const COLORS = ["#4caf50","#29b6f6","#ef5350","#ab47bc","#ff7043","#26a69a","#ffa726","#ec407a"];
const STORAGE_KEY = "mis_habitos_v2";

const DEFAULT_HABITS = [
  { name: "💧 Tomar agua", reminder: "08:00", motivation: "Me hidrata y me da energía", color: "#29b6f6" },
  { name: "🏃 Ejercicio", reminder: "07:00", motivation: "Me lleva a mi cuerpo ideal y mejor autoestima", color: "#ef5350" },
  { name: "📚 Leer", reminder: "21:00", motivation: "Expando mi mente cada noche", color: "#ab47bc" },
  { name: "🧘 Meditar", reminder: "06:30", motivation: "Paz interior para empezar el día", color: "#26a69a" },
];

function getDays(y, m) { return new Date(y, m + 1, 0).getDate(); }
function getOffset(y, m) { return (new Date(y, m, 1).getDay() + 6) % 7; }

function PlantSVG({ pct, color, size }) {
  size = size || 56;
  const stage = pct === 0 ? 0 : pct < 25 ? 1 : pct < 50 ? 2 : pct < 75 ? 3 : 4;
  const c = color || "#4caf50";
  const cDark = "#2e7d32";
  const cLight = "#a5d6a7";

  if (stage === 0) return React.createElement('svg', {width:size,height:size,viewBox:"0 0 56 56"},
    React.createElement('ellipse',{cx:28,cy:50,rx:12,ry:3,fill:"#d4c5a9",opacity:0.5}),
    React.createElement('ellipse',{cx:28,cy:46,rx:7,ry:4,fill:"#a0845c",opacity:0.35})
  );
  if (stage === 1) return React.createElement('svg', {width:size,height:size,viewBox:"0 0 56 56"},
    React.createElement('ellipse',{cx:28,cy:52,rx:12,ry:3,fill:cLight,opacity:0.4}),
    React.createElement('rect',{x:27,y:36,width:3,height:16,rx:1.5,fill:"#7a5c3a"}),
    React.createElement('ellipse',{cx:28,cy:30,rx:8,ry:9,fill:c}),
    React.createElement('ellipse',{cx:20,cy:34,rx:6,ry:5,fill:c,opacity:0.8,transform:"rotate(-20,20,34)"}),
    React.createElement('ellipse',{cx:36,cy:34,rx:6,ry:5,fill:c,opacity:0.8,transform:"rotate(20,36,34)"}),
    React.createElement('ellipse',{cx:28,cy:25,rx:6,ry:7,fill:cLight})
  );
  if (stage === 2) return React.createElement('svg', {width:size,height:size,viewBox:"0 0 56 56"},
    React.createElement('ellipse',{cx:28,cy:53,rx:14,ry:3,fill:cLight,opacity:0.5}),
    React.createElement('rect',{x:26,y:30,width:4,height:23,rx:2,fill:"#6d4c2a"}),
    React.createElement('rect',{x:16,y:38,width:13,height:4,rx:2,fill:"#8d6e3a",transform:"rotate(-10,16,38)"}),
    React.createElement('rect',{x:28,y:42,width:13,height:4,rx:2,fill:"#8d6e3a",transform:"rotate(10,28,42)"}),
    React.createElement('ellipse',{cx:28,cy:18,rx:16,ry:16,fill:cDark}),
    React.createElement('ellipse',{cx:18,cy:23,rx:11,ry:12,fill:c,transform:"rotate(-10,18,23)"}),
    React.createElement('ellipse',{cx:38,cy:23,rx:11,ry:12,fill:c,transform:"rotate(10,38,23)"}),
    React.createElement('ellipse',{cx:28,cy:11,rx:11,ry:11,fill:c,opacity:0.9}),
    React.createElement('ellipse',{cx:22,cy:9,rx:7,ry:8,fill:cLight,opacity:0.8})
  );
  if (stage === 3) return React.createElement('svg', {width:size,height:size,viewBox:"0 0 56 56"},
    React.createElement('ellipse',{cx:28,cy:54,rx:16,ry:3.5,fill:cLight,opacity:0.6}),
    React.createElement('rect',{x:25,y:24,width:6,height:30,rx:3,fill:"#5d3f1f"}),
    React.createElement('rect',{x:12,y:34,width:16,height:5,rx:2.5,fill:"#7a5228",transform:"rotate(-10,12,34)"}),
    React.createElement('rect',{x:29,y:38,width:16,height:5,rx:2.5,fill:"#7a5228",transform:"rotate(12,29,38)"}),
    React.createElement('ellipse',{cx:28,cy:14,rx:20,ry:19,fill:cDark}),
    React.createElement('ellipse',{cx:16,cy:20,rx:13,ry:15,fill:c,transform:"rotate(-8,16,20)"}),
    React.createElement('ellipse',{cx:40,cy:20,rx:13,ry:15,fill:c,transform:"rotate(8,40,20)"}),
    React.createElement('ellipse',{cx:28,cy:7,rx:14,ry:13,fill:c,opacity:0.9}),
    React.createElement('ellipse',{cx:21,cy:5,rx:9,ry:10,fill:cLight,opacity:0.8}),
    React.createElement('ellipse',{cx:35,cy:7,rx:8,ry:9,fill:cLight,opacity:0.6})
  );
  return React.createElement('svg', {width:size,height:size,viewBox:"0 0 56 56"},
    React.createElement('ellipse',{cx:28,cy:54,rx:18,ry:3.5,fill:cLight,opacity:0.7}),
    React.createElement('rect',{x:25,y:20,width:7,height:34,rx:3.5,fill:"#4a2f0f"}),
    React.createElement('rect',{x:10,y:30,width:18,height:5,rx:2.5,fill:"#6b3e12",transform:"rotate(-12,10,30)"}),
    React.createElement('rect',{x:30,y:35,width:18,height:5,rx:2.5,fill:"#6b3e12",transform:"rotate(12,30,35)"}),
    React.createElement('ellipse',{cx:28,cy:11,rx:22,ry:20,fill:cDark}),
    React.createElement('ellipse',{cx:14,cy:17,rx:15,ry:17,fill:c,transform:"rotate(-8,14,17)"}),
    React.createElement('ellipse',{cx:42,cy:17,rx:15,ry:17,fill:c,transform:"rotate(8,42,17)"}),
    React.createElement('ellipse',{cx:28,cy:5,rx:16,ry:14,fill:c,opacity:0.9}),
    React.createElement('ellipse',{cx:20,cy:3,rx:10,ry:11,fill:cLight,opacity:0.85}),
    React.createElement('ellipse',{cx:36,cy:4,rx:9,ry:10,fill:cLight,opacity:0.7}),
    React.createElement('circle',{cx:18,cy:3,r:2,fill:"#ff7043",opacity:0.9}),
    React.createElement('circle',{cx:38,cy:2,r:2,fill:"#ff7043",opacity:0.9}),
    React.createElement('circle',{cx:28,cy:1,r:2,fill:"#ffcc02",opacity:0.9})
  );
}

function App() {
  const now = new Date();
  const curY = now.getFullYear(), curM = now.getMonth(), curD = now.getDate();

  const [habits, setHabits] = useState(DEFAULT_HABITS);
  const [data, setData] = useState({});
  const [selY, setSelY] = useState(curY);
  const [selM, setSelM] = useState(curM);
  const [showPicker, setShowPicker] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [newH, setNewH] = useState({ name:"", reminder:"08:00", motivation:"", color:"#4caf50" });

  useEffect(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const p = JSON.parse(saved);
        if (p.habits) setHabits(p.habits);
        if (p.data) setData(p.data);
      }
    } catch(e) {}
  }, []);

  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ habits, data })); } catch(e) {}
  }, [habits, data]);

  const days = getDays(selY, selM);
  const offset = getOffset(selY, selM);
  const isCurMon = selY === curY && selM === curM;

  function key(y,m,d) { return `${y}-${m}-${d}`; }
  function isDone(d, hName) { return !!((data[key(selY,selM,d)] || {})[hName]); }
  function toggle(d, hName) {
    const k = key(selY,selM,d);
    setData(prev => ({ ...prev, [k]: { ...(prev[k]||{}), [hName]: !((prev[k]||{})[hName]) } }));
  }
  function countDone(hName) { return Array.from({length:days},(_,i)=>i+1).filter(d=>isDone(d,hName)).length; }
  function pct(hName) { return Math.round((countDone(hName)/days)*100); }
  function stageLabel(p) {
    if (p===0) return "Sin empezar";
    if (p<25) return "Semilla 🌱";
    if (p<50) return "Creciendo 🌿";
    if (p<75) return "Árbol joven 🌳";
    return "Árbol pleno 🌲";
  }
  function saveHabit() {
    if (!newH.name.trim()) return;
    setHabits(prev => [...prev, { name:newH.name.trim(), reminder:newH.reminder, motivation:newH.motivation.trim(), color:newH.color }]);
    setNewH({ name:"", reminder:"08:00", motivation:"", color:"#4caf50" });
    setShowAdd(false);
  }

  const days_abbr = ["L","M","X","J","V","S","D"];

  return React.createElement('div', {style:{minHeight:"100vh",background:"#f4faf4",fontFamily:"'Segoe UI',system-ui,sans-serif",color:"#1a3a1a"}},

    // Header
    React.createElement('div', {style:{background:"white",borderBottom:"1px solid #e8f5e9",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50,boxShadow:"0 1px 8px rgba(0,0,0,0.05)"}},
      React.createElement('div', null,
        React.createElement('h1', {style:{margin:0,fontSize:18,fontWeight:800,color:"#2e7d32"}}, "🌿 Mis Hábitos"),
        React.createElement('p', {style:{margin:0,fontSize:11,color:"#aaa"}}, `${MONTHS[selM]} ${selY}`)
      ),
      React.createElement('div', {style:{position:"relative"}},
        React.createElement('button', {onClick:()=>setShowPicker(v=>!v), style:{padding:"8px 14px",borderRadius:20,border:"1.5px solid #4caf50",background:"white",color:"#2e7d32",fontWeight:700,cursor:"pointer",fontSize:13}},
          `${MONTHS[selM].slice(0,3)} ${selY} ▾`
        ),
        showPicker && React.createElement('div', {style:{position:"absolute",right:0,top:44,background:"white",borderRadius:16,boxShadow:"0 8px 32px rgba(0,0,0,0.15)",padding:14,zIndex:100,width:240}},
          React.createElement('div', {style:{display:"flex",gap:6,marginBottom:10}},
            [curY-1,curY,curY+1].map(y => React.createElement('button', {key:y, onClick:()=>setSelY(y), style:{flex:1,padding:"6px 0",borderRadius:8,border:`1.5px solid ${selY===y?"#4caf50":"#ddd"}`,background:selY===y?"#e8f5e9":"white",color:selY===y?"#2e7d32":"#555",fontWeight:selY===y?700:400,cursor:"pointer",fontSize:12}}, y))
          ),
          React.createElement('div', {style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}},
            MONTHS.map((m,i) => React.createElement('button', {key:i, onClick:()=>{setSelM(i);setShowPicker(false);}, style:{padding:"7px 0",borderRadius:8,border:`1.5px solid ${selM===i?"#4caf50":"#eee"}`,background:selM===i?"#e8f5e9":"white",color:selM===i?"#2e7d32":"#444",fontWeight:selM===i?700:400,cursor:"pointer",fontSize:12}}, m.slice(0,3)))
          )
        )
      )
    ),

    // Cards
    React.createElement('div', {style:{padding:"14px 14px 40px"}},
      ...habits.map(h => {
        const p = pct(h.name);
        const done = countDone(h.name);
        const color = h.color || "#4caf50";
        return React.createElement('div', {key:h.name, style:{background:"white",borderRadius:20,marginBottom:14,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",overflow:"hidden"}},
          // Top
          React.createElement('div', {style:{display:"flex",alignItems:"center",gap:12,padding:"14px 14px 10px"}},
            React.createElement(PlantSVG, {pct:p, color, size:60}),
            React.createElement('div', {style:{flex:1}},
              React.createElement('div', {style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
                React.createElement('p', {style:{margin:0,fontWeight:800,fontSize:15,color:"#1b5e20"}}, h.name),
                React.createElement('button', {onClick:()=>setHabits(prev=>prev.filter(x=>x.name!==h.name)), style:{background:"none",border:"none",fontSize:20,color:"#ddd",cursor:"pointer",lineHeight:1}}, "×")
              ),
              h.motivation && React.createElement('p', {style:{margin:"2px 0 4px",fontSize:11,color:"#aaa",fontStyle:"italic"}}, h.motivation),
              React.createElement('div', {style:{display:"flex",alignItems:"center",gap:8}},
                React.createElement('span', {style:{fontSize:12,fontWeight:700,color}}, stageLabel(p)),
                React.createElement('span', {style:{fontSize:11,color:"#bbb"}}, `${done}/${days} días · ${p}%`)
              )
            )
          ),
          // Grid
          React.createElement('div', {style:{padding:"4px 14px 12px"}},
            React.createElement('div', {style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}},
              days_abbr.map(d => React.createElement('div', {key:d, style:{textAlign:"center",fontSize:8,color:"#ccc",fontWeight:700,paddingBottom:2}}, d)),
              ...Array.from({length:offset}).map((_,i) => React.createElement('div', {key:`e${i}`})),
              ...Array.from({length:days},(_,i)=>i+1).map(d => {
                const dn = isDone(d, h.name);
                const isToday = isCurMon && d===curD;
                const isFut = isCurMon && d>curD;
                return React.createElement('div', {
                  key:d, onClick:()=>toggle(d,h.name),
                  style:{height:24,borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:isToday?800:500,cursor:isFut?"default":"pointer",background:dn?color:isToday?"#f1f8e9":"#f7f7f7",color:dn?"white":isToday?"#2e7d32":"#ccc",border:`1.5px solid ${dn?color:isToday?color:"#ececec"}`,opacity:1,transition:"all 0.12s",boxShadow:dn?`0 1px 4px ${color}44`:"none"}
                }, dn?"✓":d);
              })
            )
          )
        );
      }),

      // Add
      showAdd ? React.createElement('div', {style:{background:"white",borderRadius:20,padding:16,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",display:"flex",flexDirection:"column",gap:10}},
        React.createElement('input', {autoFocus:true, placeholder:"🌱 Nombre del hábito", value:newH.name, onChange:e=>setNewH(p=>({...p,name:e.target.value})), onKeyDown:e=>e.key==="Enter"&&saveHabit(), style:{padding:"10px 12px",borderRadius:10,border:"1.5px solid #c8e6c9",fontSize:14,outline:"none"}}),
        React.createElement('input', {placeholder:"💬 Motivación", value:newH.motivation, onChange:e=>setNewH(p=>({...p,motivation:e.target.value})), style:{padding:"10px 12px",borderRadius:10,border:"1.5px solid #c8e6c9",fontSize:14,outline:"none"}}),
        React.createElement('div', {style:{display:"flex",alignItems:"center",gap:10}},
          React.createElement('span', {style:{fontSize:12,color:"#888"}}, "⏰"),
          React.createElement('input', {type:"time", value:newH.reminder, onChange:e=>setNewH(p=>({...p,reminder:e.target.value})), style:{padding:"8px 10px",borderRadius:10,border:"1.5px solid #c8e6c9",fontSize:14,outline:"none",flex:1}})
        ),
        React.createElement('div', {style:{display:"flex",alignItems:"center",gap:10}},
          React.createElement('span', {style:{fontSize:12,color:"#888"}}, "🎨"),
          React.createElement('div', {style:{display:"flex",gap:6,flexWrap:"wrap"}},
            COLORS.map(c => React.createElement('div', {key:c, onClick:()=>setNewH(p=>({...p,color:c})), style:{width:26,height:26,borderRadius:"50%",background:c,cursor:"pointer",border:newH.color===c?"3px solid #333":"3px solid transparent"}}))
          )
        ),
        React.createElement('div', {style:{display:"flex",gap:8}},
          React.createElement('button', {onClick:saveHabit, style:{flex:1,padding:"11px",borderRadius:12,border:"none",background:"#4caf50",color:"white",fontWeight:700,cursor:"pointer",fontSize:14}}, "Guardar 🌱"),
          React.createElement('button', {onClick:()=>setShowAdd(false), style:{padding:"11px 14px",borderRadius:12,border:"1.5px solid #ddd",background:"white",color:"#888",cursor:"pointer"}}, "✕")
        )
      ) : React.createElement('button', {onClick:()=>setShowAdd(true), style:{width:"100%",padding:"14px",borderRadius:18,border:"2px dashed #a5d6a7",background:"transparent",color:"#388e3c",fontWeight:700,cursor:"pointer",fontSize:15}}, "+ Agregar hábito")
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mi Bosque de Habitos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: linear-gradient(180deg,#e8f5e9 0%,#f9fbe7 100%); min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; }
  input { font-family: inherit; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const STORAGE_KEY = "mi_bosque_habitos_v1";

const DEFAULT_HABITS = [
  { name: "💧 Tomar agua", reminder: "08:00", motivation: "Me hidrata y me da energía" },
  { name: "🏃 Ejercicio", reminder: "07:00", motivation: "Me lleva a mi cuerpo ideal y mejor autoestima" },
  { name: "📚 Leer", reminder: "21:00", motivation: "Expando mi mente cada noche" },
  { name: "🧘 Meditar", reminder: "06:30", motivation: "Paz interior para empezar el día" },
];

function getDays(y, m) { return new Date(y, m+1, 0).getDate(); }
function getOffset(y, m) { return (new Date(y, m, 1).getDay() + 6) % 7; }

function TreeSVG({ stage, size }) {
  size = size || 38;
  const s = Math.min(stage, 4);
  if (s === 0) return React.createElement('svg', {width:size,height:size,viewBox:"0 0 40 40"},
    React.createElement('ellipse',{cx:20,cy:36,rx:8,ry:2,fill:"#d4c5a9",opacity:0.5}),
    React.createElement('circle',{cx:20,cy:32,r:4,fill:"#a0845c",opacity:0.4})
  );
  if (s === 1) return React.createElement('svg', {width:size,height:size,viewBox:"0 0 40 40"},
    React.createElement('ellipse',{cx:20,cy:38,rx:8,ry:2,fill:"#b8e0b0",opacity:0.4}),
    React.createElement('rect',{x:19,y:26,width:2,height:12,rx:1,fill:"#7a5c3a"}),
    React.createElement('ellipse',{cx:20,cy:22,rx:6,ry:7,fill:"#66bb6a"}),
    React.createElement('ellipse',{cx:15,cy:25,rx:4,ry:3.5,fill:"#4caf50",transform:"rotate(-15,15,25)"}),
    React.createElement('ellipse',{cx:25,cy:25,rx:4,ry:3.5,fill:"#4caf50",transform:"rotate(15,25,25)"}),
    React.createElement('ellipse',{cx:20,cy:18,rx:4,ry:5,fill:"#81c784"})
  );
  if (s === 2) return React.createElement('svg', {width:size,height:size,viewBox:"0 0 40 40"},
    React.createElement('ellipse',{cx:20,cy:38,rx:10,ry:2.5,fill:"#b8e0b0",opacity:0.5}),
    React.createElement('rect',{x:18,y:22,width:4,height:17,rx:2,fill:"#6d4c2a"}),
    React.createElement('ellipse',{cx:20,cy:15,rx:10,ry:11,fill:"#388e3c"}),
    React.createElement('ellipse',{cx:13,cy:19,rx:7,ry:8,fill:"#43a047",transform:"rotate(-12,13,19)"}),
    React.createElement('ellipse',{cx:27,cy:19,rx:7,ry:8,fill:"#43a047",transform:"rotate(12,27,19)"}),
    React.createElement('ellipse',{cx:20,cy:10,rx:8,ry:9,fill:"#66bb6a"}),
    React.createElement('ellipse',{cx:15,cy:9,rx:4,ry:5,fill:"#81c784",opacity:0.8})
  );
  if (s === 3) return React.createElement('svg', {width:size,height:size,viewBox:"0 0 40 40"},
    React.createElement('ellipse',{cx:20,cy:39,rx:12,ry:2.5,fill:"#b8e0b0",opacity:0.5}),
    React.createElement('rect',{x:17,y:20,width:6,height:20,rx:3,fill:"#5d3f1f"}),
    React.createElement('rect',{x:10,y:27,width:12,height:3.5,rx:1.5,fill:"#7a5228",transform:"rotate(-8,10,27)"}),
    React.createElement('rect',{x:19,y:29,width:12,height:3.5,rx:1.5,fill:"#7a5228",transform:"rotate(10,19,29)"}),
    React.createElement('ellipse',{cx:20,cy:12,rx:14,ry:14,fill:"#2e7d32"}),
    React.createElement('ellipse',{cx:12,cy:16,rx:9,ry:10,fill:"#388e3c",transform:"rotate(-8,12,16)"}),
    React.createElement('ellipse',{cx:28,cy:16,rx:9,ry:10,fill:"#388e3c",transform:"rotate(8,28,16)"}),
    React.createElement('ellipse',{cx:20,cy:7,rx:10,ry:10,fill:"#43a047"}),
    React.createElement('ellipse',{cx:14,cy:6,rx:6,ry:7,fill:"#66bb6a",opacity:0.9}),
    React.createElement('ellipse',{cx:26,cy:7,rx:5,ry:6,fill:"#66bb6a",opacity:0.7})
  );
  return React.createElement('svg', {width:size,height:size,viewBox:"0 0 40 40"},
    React.createElement('ellipse',{cx:20,cy:39,rx:13,ry:2.5,fill:"#b8e0b0",opacity:0.6}),
    React.createElement('rect',{x:17,y:18,width:6,height:22,rx:3,fill:"#4a2f0f"}),
    React.createElement('rect',{x:9,y:25,width:12,height:4,rx:2,fill:"#6b3e12",transform:"rotate(-10,9,25)"}),
    React.createElement('rect',{x:20,y:27,width:12,height:4,rx:2,fill:"#6b3e12",transform:"rotate(10,20,27)"}),
    React.createElement('ellipse',{cx:20,cy:13,rx:16,ry:15,fill:"#1b5e20"}),
    React.createElement('ellipse',{cx:11,cy:17,rx:11,ry:12,fill:"#2e7d32",transform:"rotate(-8,11,17)"}),
    React.createElement('ellipse',{cx:29,cy:17,rx:11,ry:12,fill:"#2e7d32",transform:"rotate(8,29,17)"}),
    React.createElement('ellipse',{cx:20,cy:8,rx:13,ry:12,fill:"#388e3c"}),
    React.createElement('ellipse',{cx:13,cy:7,rx:8,ry:9,fill:"#4caf50",opacity:0.9}),
    React.createElement('ellipse',{cx:27,cy:8,rx:7,ry:8,fill:"#4caf50",opacity:0.7}),
    React.createElement('ellipse',{cx:20,cy:2,rx:7,ry:7,fill:"#81c784",opacity:0.8}),
    React.createElement('circle',{cx:13,cy:6,r:1.5,fill:"#ff7043",opacity:0.9}),
    React.createElement('circle',{cx:27,cy:5,r:1.5,fill:"#ff7043",opacity:0.9}),
    React.createElement('circle',{cx:20,cy:3,r:1.5,fill:"#ffcc02",opacity:0.9})
  );
}

function App() {
  const now = new Date();
  const curY = now.getFullYear(), curM = now.getMonth(), curD = now.getDate();

  const [habits, setHabits] = useState(DEFAULT_HABITS);
  const [data, setData] = useState({});
  const [selY, setSelY] = useState(curY);
  const [selM, setSelM] = useState(curM);
  const [selD, setSelD] = useState(curD);
  const [showPicker, setShowPicker] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [newH, setNewH] = useState({ name:"", reminder:"08:00", motivation:"" });

  // Cargar datos guardados
  useEffect(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed.habits) setHabits(parsed.habits);
        if (parsed.data) setData(parsed.data);
      }
    } catch(e) {}
  }, []);

  // Guardar datos automáticamente
  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ habits, data })); } catch(e) {}
  }, [habits, data]);

  const days = getDays(selY, selM);
  const offset = getOffset(selY, selM);
  const isCurMon = selY === curY && selM === curM;

  function key(y,m,d) { return `${y}-${m}-${d}`; }
  function getDayData(d) { return data[key(selY,selM,d)] || {}; }

  function toggle(d, hName) {
    const k = key(selY,selM,d);
    setData(prev => {
      const day = prev[k] || {};
      return { ...prev, [k]: { ...day, [hName]: !day[hName] } };
    });
  }

  function countDone(d) {
    const dd = getDayData(d);
    return habits.filter(h => dd[h.name]).length;
  }

  function stage(d) {
    const c = countDone(d);
    return c===0?0:c===1?1:c===2?2:c===3?3:4;
  }

  const totalDone = Array.from({length:days},(_,i)=>countDone(i+1)).reduce((a,b)=>a+b,0);
  const totalPossible = days * habits.length;
  const pct = totalPossible > 0 ? Math.round(totalDone/totalPossible*100) : 0;

  const selDayData = getDayData(selD);
  const isFuture = isCurMon && selD > curD;
  const selStage = stage(selD);
  const selDone = habits.filter(h => selDayData[h.name]).length;

  function saveHabit() {
    if (!newH.name.trim()) return;
    setHabits(prev => [...prev, { name:newH.name.trim(), reminder:newH.reminder, motivation:newH.motivation.trim() }]);
    setNewH({ name:"", reminder:"08:00", motivation:"" });
    setShowAdd(false);
  }

  const stageLabels = ["Sin hábitos","1 hábito","2 hábitos","3 hábitos","4+ hábitos"];

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(180deg,#e8f5e9 0%,#f9fbe7 100%)",fontFamily:"'Segoe UI',system-ui,sans-serif",color:"#1a3a1a"}}>

      {/* Header */}
      <div style={{background:"rgba(255,255,255,0.95)",borderBottom:"1px solid #e0e0e0",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50}}>
        <div>
          <h1 style={{margin:0,fontSize:18,fontWeight:800,color:"#2e7d32"}}>🌲 Mi Bosque</h1>
          <p style={{margin:0,fontSize:11,color:"#888"}}>{pct}% este mes · {totalDone} hábitos completados</p>
        </div>
        <div style={{position:"relative"}}>
          <button onClick={()=>setShowPicker(v=>!v)} style={{padding:"8px 14px",borderRadius:20,border:"1.5px solid #4caf50",background:"white",color:"#2e7d32",fontWeight:700,cursor:"pointer",fontSize:13}}>
            {MONTHS[selM].slice(0,3)} {selY} ▾
          </button>
          {showPicker && (
            <div style={{position:"absolute",right:0,top:44,background:"white",borderRadius:16,boxShadow:"0 8px 32px rgba(0,0,0,0.15)",padding:14,zIndex:100,width:240}}>
              <div style={{display:"flex",gap:6,marginBottom:10}}>
                {[curY-1,curY,curY+1].map(y=>(
                  <button key={y} onClick={()=>setSelY(y)} style={{flex:1,padding:"6px 0",borderRadius:8,border:`1.5px solid ${selY===y?"#4caf50":"#ddd"}`,background:selY===y?"#e8f5e9":"white",color:selY===y?"#2e7d32":"#555",fontWeight:selY===y?700:400,cursor:"pointer",fontSize:12}}>{y}</button>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                {MONTHS.map((m,i)=>(
                  <button key={i} onClick={()=>{setSelM(i);setSelD(1);setShowPicker(false);}} style={{padding:"7px 0",borderRadius:8,border:`1.5px solid ${selM===i?"#4caf50":"#eee"}`,background:selM===i?"#e8f5e9":"white",color:selM===i?"#2e7d32":"#444",fontWeight:selM===i?700:400,cursor:"pointer",fontSize:12}}>{m.slice(0,3)}</button>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Progress bar */}
      <div style={{padding:"10px 16px 0"}}>
        <div style={{height:8,background:"rgba(0,0,0,0.07)",borderRadius:8,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#2e7d32,#81c784)",borderRadius:8,transition:"width 0.6s"}}/>
        </div>
      </div>

      <div style={{padding:"12px 16px 40px"}}>

        {/* Forest grid */}
        <div style={{background:"white",borderRadius:20,padding:14,marginBottom:14,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
          <p style={{margin:"0 0 10px",fontSize:13,fontWeight:700,color:"#2e7d32"}}>🗓 {MONTHS[selM]} {selY}</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
            {["L","M","X","J","V","S","D"].map(d=>(
              <div key={d} style={{textAlign:"center",fontSize:10,color:"#aaa",paddingBottom:4,fontWeight:600}}>{d}</div>
            ))}
            {Array.from({length:offset}).map((_,i)=><div key={`e${i}`}/>)}
            {Array.from({length:days},(_,i)=>i+1).map(d=>{
              const st = stage(d);
              const isToday = isCurMon && d===curD;
              const isSel = d===selD;
              const isFut = isCurMon && d>curD;
              return (
                <div key={d} onClick={()=>!isFut&&setSelD(d)}
                  style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"3px 1px",borderRadius:10,cursor:isFut?"default":"pointer",background:isSel?"rgba(76,175,80,0.12)":isToday?"rgba(76,175,80,0.06)":"transparent",border:`2px solid ${isSel?"#4caf50":isToday?"rgba(76,175,80,0.3)":"transparent"}`,opacity:isFut?0.3:1,transition:"all 0.2s"}}>
                  <TreeSVG stage={st} size={36}/>
                  <span style={{fontSize:9,color:isToday?"#2e7d32":"#999",fontWeight:isToday?700:400}}>{d}</span>
                </div>
              );
            })}
          </div>
          <div style={{marginTop:10,display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center"}}>
            {[0,1,2,3,4].map(s=>(
              <div key={s} style={{display:"flex",alignItems:"center",gap:3,fontSize:10,color:"#888"}}>
                <TreeSVG stage={s} size={16}/> {stageLabels[s]}
              </div>
            ))}
          </div>
        </div>

        {/* Day card */}
        <div style={{background:"white",borderRadius:20,padding:16,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
            <TreeSVG stage={selStage} size={60}/>
            <div>
              <p style={{margin:0,fontWeight:800,fontSize:16,color:"#1b5e20"}}>
                {MONTHS[selM]} {selD}{isCurMon&&selD===curD?" — Hoy 🌟":""}
              </p>
              <p style={{margin:0,fontSize:12,color:"#888"}}>{selDone} de {habits.length} hábitos{isFuture?" · Día futuro":""}</p>
              {selStage<4&&!isFuture&&habits.length>0&&(
                <p style={{margin:"3px 0 0",fontSize:11,color:"#43a047"}}>+{habits.length-selDone} más para el árbol grande 🌲</p>
              )}
            </div>
          </div>

          {habits.map(h=>{
            const done = !!selDayData[h.name];
            return (
              <div key={h.name} style={{marginBottom:8,borderRadius:14,border:`1.5px solid ${done?"#a5d6a7":"#ececec"}`,background:done?"#f1f8f1":"#fafafa"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 12px"}}>
                  <div onClick={()=>!isFuture&&toggle(selD,h.name)}
                    style={{width:24,height:24,borderRadius:"50%",flexShrink:0,background:done?"#4caf50":"white",border:`2px solid ${done?"#4caf50":"#ccc"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:"white",fontWeight:700,cursor:isFuture?"default":"pointer",transition:"all 0.2s"}}>
                    {done?"✓":""}
                  </div>
                  <div style={{flex:1,cursor:isFuture?"default":"pointer"}} onClick={()=>!isFuture&&toggle(selD,h.name)}>
                    <p style={{margin:0,fontSize:14,fontWeight:600,color:done?"#2e7d32":"#333",textDecoration:done?"line-through":"none"}}>{h.name}</p>
                    {h.motivation&&<p style={{margin:"2px 0 0",fontSize:11,color:"#999",fontStyle:"italic"}}>{h.motivation}</p>}
                    {h.reminder&&<p style={{margin:"1px 0 0",fontSize:10,color:"#bbb"}}>⏰ {h.reminder}</p>}
                  </div>
                  <button onClick={()=>setHabits(prev=>prev.filter(x=>x.name!==h.name))}
                    style={{background:"none",border:"none",fontSize:20,color:"#ddd",cursor:"pointer",padding:"0 4px",lineHeight:1}}>×</button>
                </div>
              </div>
            );
          })}

          {/* Botón + Agregar hábito */}
          <div style={{marginTop:12}}>
            {showAdd ? (
              <div style={{display:"flex",flexDirection:"column",gap:8,padding:12,borderRadius:14,border:"1.5px solid #c8e6c9",background:"#f9fef9"}}>
                <input autoFocus placeholder="🌱 Nombre del hábito (ej: 🍎 Comer sano)" value={newH.name}
                  onChange={e=>setNewH(p=>({...p,name:e.target.value}))}
                  onKeyDown={e=>e.key==="Enter"&&saveHabit()}
                  style={{padding:"9px 12px",borderRadius:10,border:"1.5px solid #c8e6c9",fontSize:14,outline:"none",background:"white"}}/>
                <input placeholder="💬 Motivación (¿por qué lo haces?)" value={newH.motivation}
                  onChange={e=>setNewH(p=>({...p,motivation:e.target.value}))}
                  style={{padding:"9px 12px",borderRadius:10,border:"1.5px solid #c8e6c9",fontSize:14,outline:"none",background:"white"}}/>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:12,color:"#888"}}>⏰ Recordatorio:</span>
                  <input type="time" value={newH.reminder}
                    onChange={e=>setNewH(p=>({...p,reminder:e.target.value}))}
                    style={{padding:"7px 10px",borderRadius:10,border:"1.5px solid #c8e6c9",fontSize:14,outline:"none",background:"white"}}/>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={saveHabit}
                    style={{flex:1,padding:"10px",borderRadius:12,border:"none",background:"#4caf50",color:"white",fontWeight:700,cursor:"pointer",fontSize:14}}>
                    Guardar 🌱
                  </button>
                  <button onClick={()=>{setShowAdd(false);setNewH({name:"",reminder:"08:00",motivation:""});}}
                    style={{padding:"10px 14px",borderRadius:12,border:"1.5px solid #ddd",background:"white",color:"#888",cursor:"pointer",fontSize:14}}>
                    ✕
                  </button>
                </div>
              </div>
            ) : (
              <button onClick={()=>setShowAdd(true)}
                style={{width:"100%",padding:"12px",borderRadius:14,border:"2px dashed #a5d6a7",background:"transparent",color:"#388e3c",fontWeight:700,cursor:"pointer",fontSize:15}}>
                + Agregar hábito
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
